<!doctype html>
<html lang="en">
      <head>
            <meta charset="UTF-8" />
            <meta
                  name="viewport"
                  content="width=device-width, initial-scale=1.0"
            />
            <title>transform-translate</title>
            <style>
                  .shadow {
                        background: gray;
                        );
                        border-radius: 50%;
                        width: 100px;
                        height: 100px;
                  }
                  .circle {
                        background-image: linear-gradient(
                              to top,
                              #00c6fb 0%,
                              #005bea 100%
                        );
                        border-radius: 50%;
                        width: 100px;
                        height: 100px;
                  }
                  .circle:hover {
                        /* transform: translate(20px,-20px); */
                        transform: translate(-20px,20px);
                  }
            </style>
      </head>
      <body>
            <div class="shadow">
                  <div class="circle"></div>
            </div>
      </body>
</html>
