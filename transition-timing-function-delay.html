<!doctype html>
<html lang="en">
      <head>
            <meta charset="UTF-8" />
            <meta
                  name="viewport"
                  content="width=device-width, initial-scale=1.0"
            />
            <title>Timing Function and Delay</title>
            <!-- https://htmlcolorcodes.com/colors/ -->
            <!-- https://cubic-bezier.com/ -->
            <!-- https://www.youtube.com/watch?v=NbnSynwqplU&t=1212s    -->
            <style>
                  .container:hover .circle {
                        transform: translateX(200px);
                  }
                  .circle {
                        width: 50px;
                        height: 50px;
                        border-radius: 50%;
                  }
                  .one {
                        background: #353935;
                        transition: transform 1s linear;
                        transition-delay: 0.5s;
                  }
                  .two {
                        background: #1f51ff;
                        transition: transform 1s ease;
                        transition-delay: 1s;
                  }
                  .three {
                        background: #00ffff;
                        transition: transform 1.5s ease-in;
                        transition-delay: 1.5s;
                  }
                  .four {
                        background: #00ff7f;
                        transition: transform 2s ease-out;
                        transition-delay: 2s;
                  }
                  .five {
                        background: #7f00ff;
                        transition: transform 1s step-end;
                        transition-delay: 0.5s;
                  }
                  .six {
                        background: #f4bb44;
                        transition: transform 3s cubic-bezier(0, 1.51, 1, -0.85);
                        transition-delay: 2.5s;
                  }
            </style>
      </head>
      <body>
            <div class="container">
                  <div class="circle one"></div>
                  <div class="circle two"></div>
                  <div class="circle three"></div>
                  <div class="circle four"></div>
                  <div class="circle five"></div>
                  <div class="circle six"></div>
            </div>
      </body>
</html>
